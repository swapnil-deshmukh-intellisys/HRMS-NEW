name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: "Asia/Kolkata"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend — TypeScript check + unit tests
  # ─────────────────────────────────────────────
  backend:
    name: Backend — Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: TypeScript type check
        run: npm run lint

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          npm test | tee backend_test.log

      - name: Upload Test Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-logs
          path: backend/backend_test.log
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Frontend — TypeScript check + unit tests
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests with coverage
        shell: bash
        run: |
          set -o pipefail
          npx vitest run --coverage --reporter=verbose | tee frontend_test.log
        
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

      - name: Upload Test Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-logs
          path: frontend/frontend_test.log
          retention-days: 1
  # ─────────────────────────────────────────────
  # JOB 3: E2E Smoke Tests
  # ─────────────────────────────────────────────
  e2e-smoke:
    name: Playwright E2E Smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start backend (background)
        run: npm --workspace backend run dev &
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Start frontend (background)
        run: npm --workspace frontend run dev &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:4000/api/health -t 60000
          npx wait-on http://localhost:5173 -t 60000
          
      - name: Run E2E Smoke Tests
        run: npm --workspace e2e run test:smoke
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_API_URL: http://localhost:4000/api

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: Build verification (both workspaces)
  # Only runs after lint + tests + E2E pass
  # ─────────────────────────────────────────────
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [e2e-smoke]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Generate Prisma client (needed for backend build)
        run: npm --workspace backend run prisma:generate
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Build backend
        run: npm --workspace backend run build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Build frontend
        run: npm --workspace frontend run build
