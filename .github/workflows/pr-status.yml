name: PR Test Summary

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  pr-comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.workflow_run.pull_requests[0].number;
            const conclusion = context.payload.workflow_run.conclusion;
            
            const emoji = conclusion === 'success' ? '✅' : '❌';
            const body = `### QA Pipeline Result: ${emoji} ${conclusion.toUpperCase()}\n\nAll automated tests have completed. Please check the CI/CD pipeline logs for detailed reports.`;
            
            github.rest.issues.createComment({
              issue_number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
