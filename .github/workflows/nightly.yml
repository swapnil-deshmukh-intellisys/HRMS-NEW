name: Nightly E2E Regression

on:
  schedule:
    - cron: '0 22 * * *' # 10:00 PM IST (4:30 PM UTC)
  workflow_dispatch: # Allow manual trigger

env:
  TZ: "Asia/Kolkata"

jobs:
  full-e2e:
    name: Full E2E & API Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start backend (background)
        run: npm --workspace backend run dev &
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Start frontend (background)
        run: npm --workspace frontend run dev &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:4000/api/health -t 60000
          npx wait-on http://localhost:5173 -t 60000

      - name: Run E2E Test Suite (All)
        run: npm --workspace e2e run test
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_API_URL: http://localhost:4000/api

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-nightly-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Notify Slack on Failure
        if: failure()
        run: |
          echo "Send Slack notification here"
          # Example: curl -X POST -H 'Content-type: application/json' --data '{"text":"Nightly E2E failed!"}' ${{ secrets.SLACK_WEBHOOK_URL }}

  performance:
    name: k6 Performance Load Test
    runs-on: ubuntu-latest
    needs: [full-e2e]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start backend (background)
        run: npm ci && npm --workspace backend run dev &
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Wait for backend
        run: npx wait-on http://localhost:4000/api/health -t 60000

      - name: Run k6 load test
        working-directory: e2e/perf
        run: k6 run attendance-checkin.k6.js
        env:
          API_URL: http://localhost:4000/api
          TEST_TOKEN: "mock-token-for-test"
