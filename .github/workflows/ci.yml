name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend — TypeScript check + unit tests
  # ─────────────────────────────────────────────
  backend:
    name: Backend — Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: TypeScript type check
        run: npm run lint

      - name: Run unit tests
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 2: Frontend — TypeScript check + unit tests
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 3: Build verification (both workspaces)
  # Only runs after lint + tests pass
  # ─────────────────────────────────────────────
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Generate Prisma client (needed for backend build)
        run: npm --workspace backend run prisma:generate
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Build backend
        run: npm --workspace backend run build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Build frontend
        run: npm --workspace frontend run build
